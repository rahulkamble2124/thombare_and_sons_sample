<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thombare & Son’s Vision - 3D Try-On & Booking</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-face-aframe.prod.js"></script>

    <style>
        :root { --blue: #0a2351; --orange: #e67e22; }
        body { font-family: 'Arial', sans-serif; margin: 0; background: #f4f4f4; }
        
        nav { display: flex; justify-content: center; background: #fff; padding: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav a { margin: 0 15px; text-decoration: none; color: var(--blue); font-weight: bold; }

        /* AR Viewport Fix */
        .ar-container { position: relative; width: 100%; max-width: 600px; height: 500px; margin: 20px auto; border-radius: 20px; overflow: hidden; background: #222; }
        
        /* Centered Header */
        header { text-align: center; padding: 30px 10px; background: white; }
        
        /* Calendly Styling */
        #booking-area { background: white; padding: 40px 10px; text-align: center; }
        .calendly-inline-widget { border: 1px solid #eee; border-radius: 15px; overflow: hidden; }

        /* Shopping */
        .shop { display: flex; justify-content: center; padding: 40px 10px; }
        .card { background: white; padding: 20px; border-radius: 15px; text-align: center; width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-wa { background: #25d366; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

<nav>
    <a href="#vto">3D Try-On</a>
    <a href="#shop">Collection</a>
    <a href="#book">Book Appointment</a>
</nav>

<header>
    <h1>THOMBARE & SON’S VISION</h1>
    <p>Realistic 3D Virtual Try-On - Kandivali East</p>
</header>

<div id="vto" class="ar-container">
    <a-scene mindar-face="uiLoading:no; uiScanning:no;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <a-asset-item id="realisticGlasses" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/face-tracking/assets/glasses/scene.gltf"></a-asset-item>
            <a-asset-item id="headModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/face-tracking/assets/sparkar/headOccluder.glb"></a-asset-item>
        </a-assets>

        <a-camera active="false" position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-face-target="anchorIndex: 168">
            <a-gltf-model src="#headModel" mindar-face-occluder position="0 -0.3 0.15" rotation="0 0 0" scale="0.065 0.065 0.065"></a-gltf-model>
            <a-gltf-model src="#realisticGlasses" rotation="0 0 0" position="0 -0.05 0" scale="0.105 0.105 0.105"></a-gltf-model>
        </a-entity>
    </a-scene>
</div>

<div id="shop" class="shop">
    <div class="card">
        <h3>Classic Black Frame</h3>
        <p>Premium Lightweight Design</p>
        <p><strong>₹1,899</strong></p>
        <a href="https://wa.me/918433792016?text=Hi, I want to buy the Classic Black Frame" class="btn-wa">Order via WhatsApp</a>
    </div>
</div>

<div id="book" id="booking-area">
    <h2 style="text-align: center;">Schedule Your Visit</h2>
    <p style="text-align: center;">Expert check-ups at Akurli Nagar.</p>
    
    <div class="calendly-inline-widget" data-url="https://calendly.com/rahul-k10210/30min" style="min-width:320px;height:700px; margin: 0 auto;"></div>
    <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
</div>

<footer style="text-align: center; padding: 40px; color: #999;">
    © 2026 Thombare & Son’s Vision Care Center
</footer>

</body>
</html>
